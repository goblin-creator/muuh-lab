<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUUH PLAYER | Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* 1. ONDOA WEUPE WOTE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0a0a0a !important; /* Giza nene */
            color: white;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        /* 2. NAVBAR */
        .nav-mini {
            padding: 15px 20px;
            background: #000;
            border-bottom: 1px solid #1a1a1a;
        }
        .nav-mini a {
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 20px;
            letter-spacing: 2px;
        }

        /* 3. VIDEO CONTAINER (FULL WIDTH) */
        .player-section {
            width: 100%;
            background: #000;
            display: flex;
            justify-content: center;
        }

        .video-wrapper {
            width: 100%;
            max-width: 1200px; /* Ipanue kidogo hapa kama unataka iwe kubwa zaidi */
            aspect-ratio: 16 / 9;
            position: relative;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 4. INFO AREA (Hapa ndio marangi meupe yalikuwa yanatokea) */
        .content-area {
            background: #0a0a0a !important; /* Lazima iwe giza hapa */
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #video-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: #D4AF37;
            margin-bottom: 15px;
        }

        .video-meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 30px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 15px;
        }

        /* BUTTONS */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }

        .back-btn {
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: #D4AF37;
            color: black;
        }

        .description {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.7;
            max-width: 700px;
        }
    </style>
</head>
<body>

    <nav class="nav-mini">
        <a href="index.html">MUUH LAB</a>
    </nav>

    <div class="player-section">
        <div class="video-wrapper">
            <div id="player-container">
                </div>
        </div>
    </div>

    <div class="content-area">
        <h1 id="video-title">MUUH CINEMA</h1>
        
        <div class="video-meta">
            <span>👁️ <span id="view-count">0</span> Views</span>
            <span>📅 <span id="upload-date">Loading...</span></span>
            <span style="color: #D4AF37;">• Full HD</span>
        </div>

        <div class="action-bar">
            <div class="description">
                <p>Asante kwa kutazama kazi kutoka MUUH Script & Film Lab.Support creativity by sharing this project.</p>
            </div>
            <a href="index.html" class="back-btn">← RUDI HOME</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="player.js"></script>
</body>
</html>
